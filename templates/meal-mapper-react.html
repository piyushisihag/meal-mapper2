<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meal Mapper — Chat Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0b1120;
      min-height: 100vh;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%   { opacity: 0.3; }
      50%  { opacity: 0.7; }
      100% { opacity: 0.3; }
    }
    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.3; }
      40%            { transform: scale(1);   opacity: 1; }
    }

    .app-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 1.5rem;
      gap: 0;
    }

    /* ── header ── */
    .header {
      text-align: center;
      margin-bottom: 1.8rem;
      animation: fadeUp 0.6s ease both;
    }
    .header-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(200,112,58,0.6);
      margin-bottom: 0.5rem;
    }
    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 300;
      color: #f0e6d6;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }
    .header-title span {
      color: #c8703a;
      font-style: italic;
    }
    .header-sub {
      margin-top: 0.55rem;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.04em;
    }

    /* ── chat shell ── */
    .chat-shell {
      width: 100%;
      max-width: 880px;
      height: 72vh;
      max-height: 760px;
      min-height: 420px;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(200,112,58,0.18);
      background: #111827;
      animation: fadeUp 0.7s 0.1s ease both;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 32px 80px rgba(0,0,0,0.55),
        0 0 60px rgba(200,112,58,0.04);
    }

    /* accent line at top */
    .chat-shell::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,112,58,0.5), transparent);
      z-index: 2;
    }

    .chat-shell iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 20px;
      z-index: 1;
    }

    /* loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 3;
      background: #111827;
      border-radius: 20px;
      transition: opacity 0.4s ease;
    }
    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(200,112,58,0.12);
      border: 1px solid rgba(200,112,58,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: shimmer 2s ease-in-out infinite;
    }
    .loading-icon svg {
      width: 22px; height: 22px;
      stroke: #c8703a;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
    }
    .loading-dots {
      display: flex;
      gap: 7px;
    }
    .loading-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #c8703a;
      display: block;
      animation: dotPulse 1.4s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    .loading-text {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.06em;
    }

    /* ── footer ── */
    .footer {
      margin-top: 1.2rem;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: fadeUp 0.7s 0.2s ease both;
    }
    .footer-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(200,112,58,0.4);
    }
    .footer-text {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.05em;
    }

    @media (max-width: 600px) {
      .chat-shell { height: 80vh; border-radius: 14px; }
      .header-title { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const BOT_URL =
      "https://cdn.botpress.cloud/webchat/v3.6/shareable.html?configUrl=https://files.bpcontent.cloud/2026/03/07/12/20260307121906-93DDA88F.json";

    function LoadingOverlay({ hidden }) {
      return (
        <div className={`loading-overlay${hidden ? " hidden" : ""}`}>
          <div className="loading-icon">
            <svg viewBox="0 0 24 24">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <div className="loading-dots">
            <span/><span/><span/>
          </div>
          <p className="loading-text">Starting your kitchen assistant…</p>
        </div>
      );
    }

    function App() {
      const [loaded, setLoaded] = useState(false);

      return (
        <div className="app-wrap">
          <header className="header">
            <p className="header-eyebrow">AI cooking assistant</p>
            <h1 className="header-title">
              Meal <span>Mapper</span>
            </h1>
            <p className="header-sub">Ingredients in &mdash; cravings out</p>
          </header>

          <main className="chat-shell">
            <LoadingOverlay hidden={loaded} />
            <iframe
              src={BOT_URL}
              allow="microphone"
              title="Meal Mapper Chat"
              onLoad={() => setLoaded(true)}
            />
          </main>

          <footer className="footer">
            <div className="footer-dot"/>
            <span className="footer-text">Meal Mapper &copy; 2026</span>
            <div className="footer-dot"/>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
