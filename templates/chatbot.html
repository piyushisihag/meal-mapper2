<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Mapper Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      font-family: 'Segoe UI', sans-serif;
    }

    .chat-wrapper {
      width: 80%;
      max-width: 900px;
      height: 80vh;
      max-height: 800px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
      position: relative;
      background: #EFE9DD;
    }

    /* ── Option A: iframe embed (recommended) ── */
    .chat-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Loading overlay while iframe loads ── */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: #EFE9DD;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #d4cfc5;
      border-top-color: #5a7a5c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-overlay p {
      color: #6b6b6b;
      font-size: 14px;
      letter-spacing: 0.03em;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="chat-wrapper">

    <!-- Loading indicator -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <p>Loading Meal Mapper...</p>
    </div>

    <!--
      ✅ REPLACE the src below with your Botpress "Shareable Link":
         Botpress Dashboard → your bot → Share → copy the URL
         It looks like: https://cdn.botpress.cloud/webchat/v3.6/?botId=YOUR_BOT_ID
         OR go to: Botpress > Webchat > Shareable Link
    -->
    <iframe
      id="botframe"
      src="https://cdn.botpress.cloud/webchat/v3.6/shareable.html?configUrl=https://files.bpcontent.cloud/2026/03/07/12/20260307121906-4ZIKV3NR.json"
      allow="microphone; camera"
      title="Meal Mapper Chatbot"
    ></iframe>

  </div>

  <script>
    // Hide loading overlay once iframe content loads
    const frame = document.getElementById('botframe');
    const overlay = document.getElementById('loadingOverlay');

    frame.addEventListener('load', () => {
      setTimeout(() => overlay.classList.add('hidden'), 300);
    });

    // Fallback: hide after 5s if load event doesn't fire
    setTimeout(() => overlay.classList.add('hidden'), 5000);
  </script>

</body>
</html>
