<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meal Mapper AI</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
    }

    #chat-container {
      width: 80%;
      max-width: 900px;
      height: 80%;
      max-height: 800px;

      border-radius: 12px;
      overflow: hidden;
      background: #EFE9DD;

      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    /* FORCE botpress into container */
    .bpWebchat {
      position: relative !important;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>

<body>

  <div id="chat-container">
    <!-- Botpress will auto inject here -->
  </div>

  <!-- YOUR SCRIPTS -->
  <script src="https://cdn.botpress.cloud/webchat/v2/inject.js"></script>

  <script>
    window.botpressWebChat.init({
      botId: "PASTE_BOT_ID",
      clientId: "PASTE_CLIENT_ID",
      container: "#chat-container",
      layoutWidth: "100%",
      layoutHeight: "100%"
    });
  </script>

</body>
</html>
